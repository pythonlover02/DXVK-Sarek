# Toggles dyasync (Dynamic Asynchronous Pipeline Compilation).
#
# When a shader is seen for the first time, it is compiled synchronously
# (which may cause a stutter). Every subsequent variant of that shader
# (a new combination of fixed-function state like blend mode, depth test,
# cull mode, render pass, etc. with the same shaders) is compiled
# asynchronously in the background. While the new variant compiles, DXVK
# renders using the closest already-compiled pipeline for those same
# shaders as a placeholder, then swaps to the correct one once it is ready.
#
# This reduces stuttering and improves frametimes compared
# to fully synchronous compilation, while being safer than a traditional
# async patch since something is always rendered on screen.
#
# Use in multiplayer games at your own discretion.
#
# Supported values: True, False

# dxvk.enableDyasync = True


