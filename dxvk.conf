# - True/False

# ddraw.forceLegacyPresent = False


# Emulate an explicit front buffer
#
# DXVK's D3D9 backend lacks an explicit front buffer, so in the case of legacy D3D
# games which rely on accesing the data from the current front buffer we need to
# ensure the content isn't discarded by (re)uploading it from its corresponding DDraw
# surface. Needless to say, this involves an additional copy, so it is slower and
# should be avoided unless needed to fix issues with missing background images.
#
# Supported values:
# - True/False

# ddraw.emulateFrontBuffer = False


# Ignore application set gamma ramps
#
# Disregard any custom gamma values requested by the application.
# Used only for testing/debugging or for personal preference.
#
# Supported values:
# - True/False

# ddraw.ignoreGammaRamp = False


# Auto-generate texture mip maps
#
# Generates all texture mip maps on the GPU, which is generally faster,
# but may cause issues in some applications. In some cases, however,
# it can actually ensure correct rendering by working around CPU texture mip
# generation quirks. These are commonly present in all Unreal Engine 1 titles.
#
# Supported values:
# - True/False

# ddraw.autoGenMipMaps = False


# Full Scene Anti-Aliasing emulation
#
# Uses supported MSAA up to 4x to emulate D3D5 and higher order-dependent
# and order-independent FSAA.
#
# Enabling support advertises FSAA capabilities to the application.
# Forcing the option will also actively enable the emulation
# regardless of application preference/configuration.
#
# May cause artifacting in some cases, but is generally safe to use.
# Comes with a performance penalty in the "Forced" mode.
#
# Supported values:
# - False: do not advertise support
# - Forced: advertise support and activate the FSAA emulation

# ddraw.emulateFSAA = False


# Legacy device names
#
# Reports the actual native D3D implementation device names, since
# some games rely on pattern matching or do capability detection based
# on exact naming. Outside of handling these rare situations, the only
# difference is cosmetic. Default disabled, for easy identification of D7VK.
#
# Supported values:
# - True/False

# ddraw.legacyDeviceNames = False
